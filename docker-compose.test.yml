services:
  pg:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: testdb
    # `mysqladmin ping` reports healthy during MySQL's first-boot init, while the
    # entrypoint still restarts the server afterwards — the seed then connects
    # mid-restart and hits "Lost connection ... reading initial communication
    # packet". An authenticated query against testdb (which only exists once init
    # completes) only succeeds on the real, restarted server; start_period keeps
    # the inevitable early failures from flapping the container unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ptest -e 'SELECT 1' testdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 20s

  mariadb:
    image: mariadb:11
    ports:
      - "13307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: test
      MARIADB_DATABASE: testdb
    # Same first-boot restart race as mysql above: ping goes healthy too early.
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uroot -ptest -e 'SELECT 1' testdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 20s

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "11433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TestPass123!"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'TestPass123!' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'TestPass123!' -Q 'SELECT 1'"]
      interval: 3s
      timeout: 5s
      retries: 20
