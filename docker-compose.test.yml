services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: agent_sql_test
    ports:
      - "5432:5432"
    volumes:
      - ./test/fixtures/pg-setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d agent_sql_test"]
      interval: 2s
      timeout: 5s
      retries: 10
