services:
  pg:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptest"]
      interval: 2s
      timeout: 5s
      retries: 15

  mariadb:
    image: mariadb:11
    ports:
      - "13307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: test
      MARIADB_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-ptest"]
      interval: 2s
      timeout: 5s
      retries: 15

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "11433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TestPass123!"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'TestPass123!' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P 'TestPass123!' -Q 'SELECT 1'"]
      interval: 3s
      timeout: 5s
      retries: 20
