name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: build + test (short) + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test (short)
        run: make test-short

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1

  integration:
    name: integration (docker-compose)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install duckdb CLI
        run: |
          curl -L -o /tmp/duckdb_cli.zip \
            "https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip"
          unzip /tmp/duckdb_cli.zip -d /usr/local/bin
          chmod +x /usr/local/bin/duckdb

      - name: Run integration tests
        run: make test-integration
